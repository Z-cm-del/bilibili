# 应用配置
app.host=0.0.0.0
app.port=8000
server.port=8000
debug=true

# SQLite 数据库
spring.datasource.url=jdbc:sqlite:./data.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false

# Elasticsearch
spring.elasticsearch.uris=http://localhost:9200
spring.elasticsearch.username=liruiqi
spring.elasticsearch.password=?????
spring.data.elasticsearch.auto-create-index=false

# OpenAI / 兼容接口配置（可替换为 DeepSeek、通义千问等）
openai.api.key=????api
openai.base.url=https://dashscope.aliyuncs.com/compatible-mode/v1
embedding.model=text-embedding-v3
llm.model=qwen-plus

# DashScope ASR（语音识别，可选）
dashscope.base.url=https://dashscope.aliyuncs.com/api/v1
asr.model=paraformer-v2
asr.timeout=600
asr.model.local=paraformer-realtime-v2
asr.input.format=pcm

# 文件上传限制
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# 日志
logging.level.root=WARN
logging.level.com.bilibili.rag=INFO
logging.level.org.springframework.web=INFO
